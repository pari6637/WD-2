<!DOCTYPE html>
<html lang="en">
<head>

    <title>Java Script</title>
</head>
<body>
    <script>
        //JS VARIABLES--contains either value or not.. could be represented using -,_ or camel type name

        var myName="Pari";
        document.write(myName);
        console.log(myName);
        var myName="Suhas";//Redeclare and reassign
        console.log(myName)

        function first() {
            var msg="Hello World";
            console.log(msg);
        }
        first();
        //variable declaration using let and const
        let myNumber=9076823132;
        console.log(myNumber);
        myNumber="987665431";
        console.log(myNumber); //no redeclare but reassign
        console(myNumber); 
        const myemail="sharmaparis04628@gmail.com";
        console.log(myemail);
        myemail="shramochddlk@gmail.com";//no declare but reassign
        console.log(myemail);  
        //JS execution
        //JS Scope
        // Variable declaration
        //
    </script>
</body>
