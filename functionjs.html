    <script>
        //Function: block of code, used or defined to perform specific task.
        //Types of function
        //Normal function: with para, without para and with default para

        //Normal function without parameters...
        
        function demo(){
            console.log("Hello Js");
        };

        demo(); //function calling

        //with parameter

        function demo1(text){
            console.log("Hello " + text);
        }
        demo1("React");

        //Default Parameters

        function add(a,b=12){
            console.log("Addition is "+ (a+b));

        }
        add(5,59);

        //Synchronous

        function cal(){
            function add(a,b){
                console.log(a+b);
            }
            function mul(x,y){
                console.log(x*y);
            }
            function sub(p,q){
                console.log(p-q);
            }
            add(7,3);
            sub(5,3);
            mul(2,3);
        }
        cal();

        //Anynomous function: An anonymous function is a function definition without a specific name, created on-the-fly for short-term tasks, callbacks, or one-time use. They are commonly assigned to variables or passed directly to higher-order functions. 

        let msg=function(){
            console.log("Hello ABES");
            console.log(typeof(msg));
        }
        msg();
        //short code for above function i.e. arrow function
        let msg1=()=>console.log("Hello ABES EC");
        msg1();

        //arrowfunction using multiple lines

        let msg2=(a,b)=>{
            var num1=a;
            var num2=b;
            var res=num1/num2;
            console.log("Result is "+ res);
        }
        msg2(10,20);

        //IIFE: An Immediately Invoked Function Expression (IIFE) is a JavaScript function that runs as soon as it is defined
        (function(){
            console.log("Hello World")
        })();
        (msg=>console.log("hello"))();
        //Promises-
        /*states: Promises exist in one of the three states:
        Pending:*/
        let myPromise=new Promise(function(resolve,reject){
            let age=25;
            if(age>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year");
            }
        });
        myPromise.then(msg=>console.log(msg)).catch(error=>console.log(error));
